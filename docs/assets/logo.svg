  <!-- Connecting arrow -->
  <line x1="32" y1="29" x2="32" y2="35" stroke="#6d28d9" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6d28d9"/>
    </marker>
  </defs>
</svg>
