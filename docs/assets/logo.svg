<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Hexagon background -->
  <polygon points="32,4 58,18 58,46 32,60 6,46 6,18" fill="#6d28d9" opacity="0.15"/>
  <polygon points="32,4 58,18 58,46 32,60 6,46 6,18" fill="none" stroke="#6d28d9" stroke-width="2"/>
  <!-- Agent node (circle) -->
  <circle cx="32" cy="22" r="7" fill="#6d28d9"/>
  <!-- Gateway (diamond) -->
